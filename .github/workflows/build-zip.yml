name: Build Theme Zip

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stamp build version
        run: |
          BUILD_VERSION="1.0.${{ github.run_number }}"
          sed -i "s/^Version: .*/Version: ${BUILD_VERSION}/" style.css
          sed -i "s/define( 'SCOUT_STARTER_VERSION', '[^']*' );/define( 'SCOUT_STARTER_VERSION', '${BUILD_VERSION}' );/" functions.php
          echo "BUILD_VERSION=${BUILD_VERSION}" >> $GITHUB_ENV

      - name: Build zip
        run: |
          mkdir -p /tmp/scout-starter
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='README.md' \
            --exclude='CLAUDE.md' \
            ./ /tmp/scout-starter/
          cd /tmp
          zip -r scout-starter.zip scout-starter/

      - name: Create release
        run: |
          gh release create "v${{ env.BUILD_VERSION }}" /tmp/scout-starter.zip \
            --title "Scout Starter v${{ env.BUILD_VERSION }}" \
            --notes "Built from commit ${{ github.sha }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
