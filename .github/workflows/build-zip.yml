name: Build Theme Zip

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version
        id: version
        run: |
          VERSION=$(grep "^Version:" style.css | sed 's/Version:[[:space:]]*//')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          if gh release view "v${VERSION}" &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build zip
        if: steps.version.outputs.exists == 'false'
        run: |
          mkdir -p /tmp/scout-starter
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='README.md' \
            --exclude='CLAUDE.md' \
            ./ /tmp/scout-starter/
          cd /tmp
          zip -r scout-starter.zip scout-starter/

      - name: Generate release notes
        if: steps.version.outputs.exists == 'false'
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Find the commit where this version was introduced
          PREV_TAG=$(git tag --sort=-version:refname | head -n 1)
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"- %s" --no-merges)
          fi
          {
            echo "notes<<EOF"
            echo "Built from commit ${{ github.sha }}"
            echo ""
            echo "### Changes since last release"
            echo "${COMMITS}"
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create release
        if: steps.version.outputs.exists == 'false'
        run: |
          gh release create "v${{ steps.version.outputs.version }}" /tmp/scout-starter.zip \
            --title "Scout Starter v${{ steps.version.outputs.version }}" \
            --notes "${{ steps.notes.outputs.notes }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
